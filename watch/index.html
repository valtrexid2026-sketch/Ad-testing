<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<title>CodeTube - Watch</title>
<style>
:root{
  --bg:#ffffff;
  --bg-soft:#f2f2f2;
  --bg-elev:#ececec;
  --bg-elev-2:#d9d9d9;
  --border:rgba(0,0,0,.1);
  --text:#0f0f0f;
  --text-soft:#606060;
  --text-mute:#909090;
  --accent:#ff0033;
  --radius:12px;
  --header-h:56px;
  --font-stack:"Roboto","Helvetica Neue","Noto Sans",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-stack);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
img{display:block;max-width:100%}

/* ---------- Header ---------- */
header.app{
  position:fixed; inset:0 0 auto 0; height:var(--header-h); z-index:50;
  display:flex; align-items:center; gap:8px; padding:0 12px;
  background:rgba(255,255,255,.96);
  backdrop-filter:saturate(180%) blur(8px);
  -webkit-backdrop-filter:saturate(180%) blur(8px);
  border-bottom:1px solid var(--border);
}
.app-start{display:flex;align-items:center;gap:8px;flex:0 0 auto}

.icon-btn{
  width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  color:inherit; transition:background .15s ease;
}
.icon-btn:hover{background:var(--bg-elev-2)}
.icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.icon-btn svg{width:24px;height:24px;fill:currentColor}

.brand{display:inline-flex;align-items:center;gap:6px;padding:0 8px}
.brand-img{display:block;width:auto;height:auto;max-height:36px;max-width:240px}

/* ---------- Main layout ---------- */
main{padding:calc(var(--header-h) + 24px) 24px 40px 24px; min-height:100vh; max-width:1600px; margin:0 auto}

.player-shell{
  display:grid; grid-template-columns: minmax(0, 1fr) 360px;
  gap:32px; align-items:start;
}

.player-frame{
  position:relative; width:100%; aspect-ratio:16/9; background:#000;
  border-radius:var(--radius); overflow:hidden; margin:0;
}
.player-frame video{width:100%;height:100%;display:block}

.watch-title{font-size:1.4rem;margin:14px 0 6px 0;color:inherit;line-height:1.3}
.watch-meta{font-size:13px;color:var(--text-soft);margin-bottom:12px}
.watch-channel{
  display:flex; align-items:center; gap:12px;
  padding:8px 0; margin:8px 0;
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
}
.watch-channel .ch{
  width:48px;height:48px;border-radius:50%;background:var(--bg-elev);
  flex:0 0 auto;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:18px;color:#fff;
}
.watch-channel .name{font-weight:600;font-size:1rem}
.watch-channel .subs{font-size:12px;color:var(--text-soft)}

.description-box{
  background:var(--bg-soft); border-radius:var(--radius); padding:12px;
  font-size:14px; color:inherit; line-height:1.45; margin-top:8px;
}
.description-box .stats{font-weight:600;margin-bottom:6px}

/* Up next rail */
.up-next-title{
  font-size:1rem; font-weight:600; color:inherit;
  margin:0 0 12px 0; padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.up-next-empty{
  color:var(--text-mute); padding:30px 12px; text-align:center; font-size:14px;
}
.rec-card{
  display:flex; gap:8px; padding:8px; border-radius:8px;
  cursor:pointer; transition:background .15s ease;
}
.rec-card:hover{background:var(--bg-soft)}
.rec-card .thumb{width:168px;aspect-ratio:16/9;flex:0 0 auto;position:relative;overflow:hidden;border-radius:8px;background:#000}
.rec-card .thumb img{width:100%;height:100%;object-fit:cover}
.rec-card .meta{flex:1;min-width:0;padding-top:0}
.rec-card .title{font-size:14px;font-weight:600;color:inherit;margin:0 0 4px 0;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rec-card .sub{font-size:12px;color:var(--text-soft);display:flex;flex-direction:column;gap:2px}
.rec-card .sub .ch-name{color:inherit;font-weight:500;font-size:12px}
.rec-card .duration{
  position:absolute; right:6px; bottom:6px;
  background:rgba(0,0,0,.8); color:#fff; font-size:11px; font-weight:500;
  padding:1px 4px; border-radius:3px;
}

/* Error state when no/ unknown id */
.error-state{
  text-align:center; padding:80px 24px; color:var(--text-soft);
}
.error-state h1{
  font-size:1.4rem; color:inherit; margin:0 0 8px 0; font-weight:600;
}
.error-state p{margin:0 0 18px 0}
.error-state .home-link{
  display:inline-block; padding:10px 20px; border-radius:999px;
  background:#0f0f0f; color:#fff; font-weight:600; font-size:14px;
  transition:transform .15s ease, background .15s ease;
}
.error-state .home-link:hover{transform:translateY(-1px);background:#1f1f1f}

/* Hide the rail entirely when no neighbours to show */
.up-next[hidden]{display:none}

/* ---------- Responsive ---------- */
@media (max-width:900px){
  .player-shell{grid-template-columns:1fr;gap:24px;padding:0;}
}
@media (max-width:700px){
  main{padding-left:12px;padding-right:12px;padding-top:calc(var(--header-h) + 12px)}
  .watch-title{font-size:1.2rem}
}
</style>
</head>
<body>

<header class="app">
  <div class="app-start">
    <a href="../" class="icon-btn" aria-label="Back to home">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    </a>
    <a href="../" class="brand" aria-label="CodeTube home">
      <img src="../logo-light.png" alt="CodeTube" class="brand-img">
    </a>
  </div>
</header>

<main>
  <div class="player-shell" id="playerShell">
    <div id="primary">
      <div class="player-frame"><video id="playerVideo" controls playsinline></video></div>
      <h1 class="watch-title" id="watchTitle"></h1>
      <div class="watch-meta">
        <span id="watchViews"></span> &middot; <span id="watchDate"></span>
      </div>
      <div class="watch-channel">
        <div class="ch" id="watchChAvatar"></div>
        <div>
          <div class="name" id="watchChName"></div>
          <div class="subs" id="watchChSubs"></div>
        </div>
      </div>
      <div class="description-box" id="watchDescription"></div>
    </div>
    <aside class="up-next" id="upNext" hidden>
      <h2 class="up-next-title">Up next</h2>
      <div id="recList"></div>
    </aside>
  </div>

  <div class="error-state" id="errorState" hidden>
    <h1>Video not found</h1>
    <p id="errorDetail">The video you requested doesn&rsquo;t exist or has been removed.</p>
    <a class="home-link" href="./">Back to recent videos</a>
  </div>
</main>

<script src="../data.js"></script>
<script>
/* ---------- Helpers ---------- */
function chipColor(channel){
  let h=0;
  for(let i=0;i<channel.length;i++) h=(h*31+channel.charCodeAt(i))>>>0;
  return `hsl(${h%360} 60% 45%)`;
}
function escapeAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }
function escapeHTML(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function recCardHTML(v){
  return `
  <a class="rec-card" href="./?id=${encodeURIComponent(v.id)}" data-id="${escapeAttr(v.id)}">
    <div class="thumb">
      <img loading="lazy" src="${escapeAttr(v.thumb)}" alt="">
      <span class="duration">${escapeAttr(v.duration)}</span>
    </div>
    <div class="meta">
      <h3 class="title">${escapeAttr(v.title)}</h3>
      <div class="sub">
        <span class="ch-name">${escapeAttr(v.channel)}</span>
        <span>${escapeAttr(v.views)} &middot; ${escapeAttr(v.date)}</span>
      </div>
    </div>
  </a>`;
}

/* ---------- Page bootstrapping ---------- */
function showError(detail){
  document.getElementById("playerShell").hidden = true;
  const errEl = document.getElementById("errorState");
  if(detail) document.getElementById("errorDetail").textContent = detail;
  errEl.hidden = false;
  document.title = "Video not found · CodeTube";
}

function renderVideo(v){
  document.title = `${v.title} · CodeTube`;
  const playerVideo = document.getElementById("playerVideo");
  playerVideo.src = v.src;
  playerVideo.poster = v.thumb;
  playerVideo.play().catch(()=>{});

  document.getElementById("watchTitle").textContent = v.title;
  document.getElementById("watchViews").textContent = v.views;
  document.getElementById("watchDate").textContent  = v.date;
  document.getElementById("watchChName").textContent = v.channel;
  document.getElementById("watchChSubs").textContent = v.subs;
  document.getElementById("watchChAvatar").outerHTML =
    `<div class="ch" style="background:${chipColor(v.channel)}">${
      v.channel.split(/\s+/).slice(0,2).map(s=>s[0]).join("").toUpperCase()
    }</div>`;
  document.getElementById("watchDescription").innerHTML =
    `<div class="stats">${escapeHTML(v.views)} &middot; ${escapeHTML(v.date)}</div>${escapeHTML(v.desc)}`;

  /* Up-next: every other video except the current one, sorted by addedAt desc. */
  const others = videos
    .filter(x => x.id !== v.id)
    .sort((a,b) => (b.addedAt||0) - (a.addedAt||0));

  const upNext    = document.getElementById("upNext");
  const recList   = document.getElementById("recList");
  if(others.length === 0){
    upNext.hidden = true;
  } else {
    upNext.hidden = false;
    recList.innerHTML = others.map(recCardHTML).join("");
  }
}

(function init(){
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  if(!id){
    showError("Open this page from a video link (e.g. /watch/?id=sintel) or return home to browse recent videos.");
    return;
  }
  const v = videos.find(x => x.id === id);
  if(!v){
    showError(`No video with id “${escapeHTML(id)}”. Head home and pick another one.`);
    return;
  }
  renderVideo(v);
})();
</script>
</body>
</html>
