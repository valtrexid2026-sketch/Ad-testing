<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<title>CodeTube - Recent videos</title>
<style>
:root{
  --bg:#ffffff;
  --bg-soft:#f2f2f2;
  --bg-elev:#ececec;
  --bg-elev-2:#d9d9d9;
  --border:rgba(0,0,0,.1);
  --text:#0f0f0f;
  --text-soft:#606060;
  --text-mute:#909090;
  --accent:#ff0033;
  --radius:12px;
  --header-h:56px;
  --font-stack:"Roboto","Helvetica Neue","Noto Sans",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-stack);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
img{display:block;max-width:100%}

/* ---------- Header ---------- */
header.app{
  position:fixed; inset:0 0 auto 0; height:var(--header-h); z-index:50;
  display:flex; align-items:center; gap:16px; padding:0 16px;
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(8px);
  -webkit-backdrop-filter:saturate(180%) blur(8px);
}
.app-start,.app-end{display:flex;align-items:center;gap:8px;flex:0 0 auto}

.brand{display:inline-flex;align-items:center;gap:6px;padding:0 8px}
.brand-img{display:block;width:auto;height:auto;max-height:36px;max-width:240px}

/* My-account avatar on the right */
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#ff7a00,#ff0033);
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;flex:0 0 auto;
}

/* ---------- Main ---------- */
main{padding:calc(var(--header-h) + 24px) 24px 40px 24px; min-height:100vh; max-width:1600px; margin:0 auto}

.page-title{
  font-size:1.25rem; font-weight:600; color:inherit;
  margin:8px 0 18px 0;
  display:flex; align-items:center; gap:10px;
}
.page-title .count{
  background:var(--bg-elev-2); color:var(--text-soft);
  padding:2px 8px; border-radius:999px; font-size:12px; font-weight:600;
}

/* ---------- Grid ---------- */
.grid{
  display:grid; gap:24px 16px;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
}

.card{
  background:transparent; border-radius:var(--radius); overflow:hidden;
  cursor:pointer; transition:transform .15s ease;
  display:flex; flex-direction:column; gap:12px;
}
.card:hover .thumb img{transform:scale(1.02)}
.card:hover{background:var(--bg-soft)}

.thumb{
  position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; border-radius:var(--radius); background:#000;
}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.thumb::after{
  content:"";position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .15s ease;pointer-events:none;
}
.card:hover .thumb::after{background:rgba(0,0,0,.05)}

.duration{
  position:absolute; right:8px; bottom:8px;
  background:rgba(0,0,0,.8); color:#fff; font-size:12px; font-weight:500;
  padding:2px 6px; border-radius:4px;
}

.info{display:flex;gap:12px;padding:0 4px 8px 4px}
.info .ch{width:36px;height:36px;border-radius:50%;background:var(--bg-elev);flex:0 0 auto;overflow:hidden;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.meta{flex:1;min-width:0;padding-top:4px}
.title{font-size:1rem;font-weight:600;color:inherit;margin:0 0 6px 0;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sub{font-size:12px;color:var(--text-soft);display:flex;flex-direction:column;gap:2px}
.sub .ch-name{color:inherit;font-weight:500}

.empty-state{
  color:var(--text-mute);
  padding:60px 40px; text-align:center; font-size:18px;
}
.empty-state .hint{font-size:13px;color:var(--text-soft);margin-top:8px}

/* ---------- Responsive ---------- */
@media (max-width:700px){
  main{padding-left:8px;padding-right:8px;padding-top:calc(var(--header-h) + 16px)}
  .grid{grid-template-columns:1fr;gap:24px}
}
</style>
</head>
<body>

<header class="app">
  <div class="app-start">
    <a href="./" class="brand" aria-label="CodeTube home">
      <img src="logo-light.png" alt="CodeTube" class="brand-img">
    </a>
  </div>
  <div class="app-end">
    <div class="avatar" aria-label="Your account">U</div>
  </div>
</header>

<main>
  <h1 class="page-title">
    Recent videos
    <span class="count" id="videoCount">0</span>
  </h1>
  <div class="grid" id="grid"><!-- populated by JS --></div>
</main>

<script src="data.js"></script>
<script>
/* ---------- Helpers ---------- */
function chipColor(channel){
  let h=0;
  for(let i=0;i<channel.length;i++) h=(h*31+channel.charCodeAt(i))>>>0;
  return `hsl(${h%360} 60% 45%)`;
}
function channelAvatar(channel){
  const initials = channel.split(/\s+/).slice(0,2).map(s=>s[0]).join("").toUpperCase();
  return `<div class="ch" style="background:${chipColor(channel)}">${initials}</div>`;
}
function escapeAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

function videoCard(v){
  return `
  <article class="card" data-id="${escapeAttr(v.id)}" data-cat="${escapeAttr(v.cat)}">
    <div class="thumb">
      <img loading="lazy" src="${escapeAttr(v.thumb)}" alt="${escapeAttr(v.title)}">
      <span class="duration">${escapeAttr(v.duration)}</span>
    </div>
    <div class="info">
      ${channelAvatar(v.channel)}
      <div class="meta">
        <h3 class="title">${escapeAttr(v.title)}</h3>
        <div class="sub">
          <span class="ch-name">${escapeAttr(v.channel)}</span>
          <span>${escapeAttr(v.views)} &middot; ${escapeAttr(v.date)}</span>
        </div>
      </div>
    </div>
  </article>`;
}

/* ---------- Home: render all videos sorted by addedAt desc ---------- */
function renderRecent(){
  const sorted = [...videos].sort((a,b) => (b.addedAt||0) - (a.addedAt||0));
  document.getElementById("videoCount").textContent = sorted.length;
  document.getElementById("grid").innerHTML = sorted.map(videoCard).join("");
}
renderRecent();

/* Click any card → navigate to /watch/?id=ID (full page nav, no overlay). */
document.getElementById("grid").addEventListener("click",(e)=>{
  const t = e.target.closest(".card");
  if(!t || !t.dataset.id) return;
  location.href = `watch/?id=${encodeURIComponent(t.dataset.id)}`;
});
</script>
</body>
</html>
