<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VideoHub</title>
<style>
body{margin:0;font-family:system-ui;background:#fafafa;color:#222}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;gap:16px}
header img{height:42px}.search{flex:1}.search input{width:100%;padding:10px 16px;border-radius:24px;border:1px solid #ccc}
.wrap{display:grid;grid-template-columns:minmax(0,2fr) 380px;gap:20px;padding:20px}
video{width:100%;border-radius:12px;background:#000}
.card{display:flex;gap:10px;padding:8px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:10px;cursor:pointer}
.card img{width:150px;height:84px;border-radius:8px}
#ad iframe{width:100%;height:84px;border:0}
@media(max-width:900px){.wrap{grid-template-columns:1fr}}
</style></head><body>
<header><img src="codetube-logo-light - Bewerkt_20260708_012238_0000.png"><div class="search"><input placeholder="Search"></div></header>
<div class="wrap"><main><video id="p" controls><source id="s"></video><h2 id="tt"></h2><p id="dd"></p></main><aside id="list"></aside></div>
<script>
const vids=[
["Big Buck Bunny","Blender Foundation","https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4","https://dummyimage.com/300x170/ddd/000&text=Big+Buck+Bunny"],
["Elephants Dream","Open Movie","https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4","https://dummyimage.com/300x170/ccc/000&text=Elephants+Dream"],
["Sintel","Blender","https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4","https://dummyimage.com/300x170/bbb/000&text=Sintel"]];
function play(v){s.src=v[2];p.load();tt.textContent=v[0];dd.textContent=v[1]}
play(vids[0]);
vids.forEach((v,i)=>{let c=document.createElement('div');c.className='card';c.innerHTML=`<img src="${v[3]}"><div><b>${v[0]}</b><br><small>${v[1]}</small></div>`;c.onclick=()=>play(v);list.appendChild(c);if(i==0){let a=document.createElement('div');a.className='card';a.id='ad';a.innerHTML=`<iframe data-aa='2447509' src='//acceptable.a-ads.com/2447509/?size=Adaptive'></iframe>`;list.appendChild(a);}});
</script></body></html>
