<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#ffffff">
<title>CodeTube - Your code, on demand</title>
<style>
:root{
  --bg:#ffffff;
  --bg-soft:#f2f2f2;
  --bg-elev:#ececec;
  --bg-elev-2:#d9d9d9;
  --border:rgba(0,0,0,.1);
  --text:#0f0f0f;
  --text-soft:#606060;
  --text-mute:#909090;
  --accent:#ff0033;        /* YouTube-red accent stays consistent in both modes */
  --shadow:0 1px 2px rgba(0,0,0,.06);
  --radius:12px;
  --header-h:56px;
  --chip-h:56px;
  --font-stack:"Roboto","Helvetica Neue","Noto Sans",system-ui,-apple-system,Segoe UI,Arial,sans-serif;
}

*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-stack);font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}
img{display:block;max-width:100%}

/* ---------- Header ---------- */
header.app{
  position:fixed; inset:0 0 auto 0; height:var(--header-h); z-index:50;
  display:flex; align-items:center; gap:16px; padding:0 16px;
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(180%) blur(8px);
  -webkit-backdrop-filter:saturate(180%) blur(8px);
}
.app-start,.app-end{display:flex;align-items:center;gap:8px;flex:0 0 auto}
.app-center{flex:1 1 auto;display:flex;align-items:center;justify-content:center;gap:8px;max-width:700px;margin:0 auto}

.icon-btn{
  width:40px; height:40px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
  color:inherit; transition:background .15s ease;
}
.icon-btn:hover{background:var(--bg-elev-2)}
.icon-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.icon-btn svg{width:24px;height:24px;fill:currentColor}

.brand{display:inline-flex;align-items:center;gap:6px;padding:0 8px}
.brand-img{display:block;width:auto;height:22px;max-width:56px;flex:0 0 auto}
/* .brand-text removed — the wordmark is baked into logo-light.png */

.search-shell{display:flex;flex:1;align-items:center;border:1px solid var(--border);border-radius:40px 0 0 40px;overflow:hidden;  background:#f8f8f8;height:40px;transition:border-color .15s ease,box-shadow .15s ease}
.search-shell:focus-within{border-color:#1c62b9;box-shadow:inset 0 0 0 1px #1c62b9}
.search-shell input{flex:1;border:0;background:transparent;padding:0 16px;color:inherit;font-size:1rem;outline:none;min-width:0}
.search-shell input::placeholder{color:var(--text-mute)}
.search-btn{width:64px;height:40px;background:var(--bg-elev);display:flex;align-items:center;justify-content:center;border-left:1px solid var(--border);transition:background .15s ease}
.search-btn:hover{background:var(--bg-elev-2)}
.search-btn svg{width:22px;height:22px;fill:currentColor}

.mic-btn{width:40px;height:40px;border-radius:50%;background:var(--bg-elev);display:inline-flex;align-items:center;justify-content:center;transition:background .15s ease}
.mic-btn:hover{background:var(--bg-elev-2)}
.mic-btn svg{width:22px;height:22px;fill:currentColor}

.search-toggle{
  width:40px;height:40px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  background:none;border:0;cursor:pointer;color:inherit;
  transition:background .15s ease;
}
.search-toggle:hover,.search-toggle.active{background:var(--bg-elev-2)}
.search-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.search-toggle svg{width:24px;height:24px;fill:currentColor}

/* Search dropdown panel - slides down from below the top nav */
.search-dropdown{
  position:fixed; left:0; right:0; top:var(--header-h);
  z-index:45;
  padding:14px 24px;
  display:flex; gap:12px; align-items:center;
  background:rgba(255,255,255,.96);
  backdrop-filter:saturate(180%) blur(8px);
  -webkit-backdrop-filter:saturate(180%) blur(8px);
  border-bottom:1px solid var(--border);
  transform:translateY(-12px); opacity:0; visibility:hidden;
  transition:transform .18s ease, opacity .15s ease, visibility .15s linear;
}
.search-dropdown.open{
  transform:translateY(0); opacity:1; visibility:visible;
}
.search-dropdown .search-shell{flex:1; max-width:720px; margin:0 auto}
.search-close{flex:0 0 auto}

.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#ff7a00,#ff0033);
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;color:#fff;flex:0 0 auto;
}

/* ---------- Chip row ---------- */
nav.chips{
  position:fixed; left:0; right:0; top:var(--header-h);
  height:var(--chip-h); z-index:40;
  display:flex; align-items:center; gap:12px; padding:0 24px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(6px);
  border-bottom:1px solid transparent;
  overflow-x:auto; scrollbar-width:none;
}
nav.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto; padding:8px 14px; border-radius:8px; font-size:14px; font-weight:500;
  background:var(--bg-elev); color:inherit; transition:background .15s ease,color .15s ease,transform .15s ease;
}
.chip:hover{background:var(--bg-elev-2)}
.chip.active{background:#0f0f0f;color:#fff;font-weight:600}
.chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ---------- Main / Grid ---------- */
main{padding:calc(var(--header-h) + var(--chip-h) + 12px) 24px 40px 24px; min-height:100vh}

.grid{
  display:grid; gap:24px 16px;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
}

.card{
  background:transparent; border-radius:var(--radius); overflow:hidden;
  cursor:pointer; transition:transform .15s ease;
  display:flex; flex-direction:column; gap:12px;
}
.card:hover .thumb img{transform:scale(1.02)}
.card:hover{background:var(--bg-soft)}

.thumb{
  position:relative; width:100%; aspect-ratio:16/9; overflow:hidden; border-radius:var(--radius); background:#000;
}
.thumb img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}

.duration{
  position:absolute; right:8px; bottom:8px;
  background:rgba(0,0,0,.8); color:#fff; font-size:12px; font-weight:500;
  padding:2px 6px; border-radius:4px;
}

.info{display:flex;gap:12px;padding:0 4px 8px 4px}
.info .ch{width:36px;height:36px;border-radius:50%;background:var(--bg-elev);flex:0 0 auto;overflow:hidden;display:flex;align-items:center;justify-content:center;color:inherit;font-weight:700;font-size:14px}
.meta{flex:1;min-width:0}
.title{font-size:15px;font-weight:600;color:inherit;margin:0 0 4px 0;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.sub{font-size:13px;color:var(--text-soft);line-height:1.35}
.sub .ch-name{display:block}
.sub .ch-name:hover{color:#000}

/* Ad card */
.card.ad .info{flex-direction:row;align-items:flex-start}
.ad-info-icon{width:20px;height:20px;border-radius:50%;background:var(--bg-elev);color:var(--text-soft);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-right:8px;flex:0 0 auto}
.ad-badge{position:absolute;left:8px;top:8px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:500;padding:2px 6px;border-radius:4px;letter-spacing:.04em}

/* ---------- Player overlay ---------- */
.player-overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;overflow:auto}
.player-overlay.open{display:flex;flex-direction:column;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.player-top{display:flex;align-items:center;padding:12px 16px;gap:16px;position:sticky;top:0;background:var(--bg);z-index:2;border-bottom:1px solid var(--border)}
.player-top .icon-btn{margin-right:auto}
.player-top .title-bar{font-weight:600;color:var(--text-mute);font-size:14px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.player-body{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:24px;padding:24px;max-width:1800px;margin:0 auto;width:100%}
@media (max-width:1100px){.player-body{grid-template-columns:1fr;padding:16px}}

.player-frame{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--radius);overflow:hidden}
.player-frame video{width:100%;height:100%;object-fit:contain;background:#000}

.watch-title{font-size:1.25rem;font-weight:700;color:inherit;margin:16px 0 8px 0;line-height:1.3}
.watch-meta{display:flex;flex-wrap:wrap;align-items:center;gap:12px;color:var(--text-soft);font-size:14px;margin-bottom:12px}
.watch-channel{display:flex;align-items:center;gap:12px;margin:8px 0 16px 0}
.watch-channel .ch{width:40px;height:40px}
.watch-channel .name{font-weight:600;color:inherit}
.watch-channel .subs{font-size:12px;color:var(--text-soft)}
.subscribe-btn{margin-left:auto;background:#0f0f0f;color:#fff;padding:10px 16px;border-radius:24px;font-weight:600;font-size:14px;transition:opacity .15s ease}
.subscribe-btn:hover{opacity:.85}

.description-box{background:var(--bg-soft);border-radius:var(--radius);padding:12px;font-size:14px;color:inherit;line-height:1.45;margin-top:8px}
.description-box .stats{font-weight:600;margin-bottom:6px}

.up-next-title{font-size:1rem;font-weight:600;color:inherit;margin:0 0 12px 0;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rec-card{display:flex;gap:8px;padding:8px;border-radius:8px;cursor:pointer;transition:background .15s ease}
.rec-card:hover{background:var(--bg-soft)}
.rec-card .thumb{width:168px;aspect-ratio:16/9;flex:0 0 auto}
.rec-card .meta{flex:1;min-width:0;padding-top:0}
.rec-card .title{font-size:14px;-webkit-line-clamp:2}
.rec-card .sub .ch-name{font-size:12px}
.rec-card .duration{font-size:11px;padding:1px 4px}

/* ---------- Drawer / mobile ---------- */
@media (max-width:700px){
  .app-center{max-width:none}
  .search-shell{max-width:none}
  main{padding-left:8px;padding-right:8px}
  .grid{grid-template-columns:1fr;gap:24px}
  nav.chips{padding:0 8px;gap:8px}
}

/* Sidebar drawer (lazy, mini) */
aside.drawer{
  position:fixed;top:var(--header-h);left:0;bottom:0;width:240px;background:var(--bg-soft);
  transform:translateX(-100%);transition:transform .2s ease;z-index:60;padding:12px 0;border-right:1px solid var(--border);overflow:auto
}
aside.drawer.open{transform:translateX(0)}
.drawer-item{display:flex;align-items:center;gap:20px;padding:0 24px;height:40px;color:inherit;border-radius:8px;margin:0 12px;transition:background .15s ease;font-size:14px}
.drawer-item:hover{background:var(--bg-elev)}
.drawer-item.active{background:var(--bg-elev);font-weight:600}
.drawer-item svg{width:24px;height:24px;fill:currentColor}
.drawer-section-title{padding:8px 24px;font-size:14px;color:var(--text-soft);font-weight:600;border-top:1px solid var(--border);margin-top:8px}

/* small visual touch: subtle hover overlay */
.thumb::after{
  content:"";position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .15s ease;pointer-events:none;
}
.card:hover .thumb::after{background:rgba(0,0,0,.05)}
</style>
</head>
<body>

<header class="app">
  <div class="app-start">
    <button class="icon-btn" id="menuBtn" aria-label="Menu">

<nav class="chips" id="chipBar" aria-label="Filter chips">

<main>
  <div class="grid" id="grid"><!-- populated by JS --></div>

<!-- Watch overlay -->
<div class="player-overlay" id="overlay" role="dialog" aria-label="Video player">
  <div class="player-top">
    <button class="icon-btn" id="closeWatch" aria-label="Close">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <div class="title-bar">Watch on CodeTube</div>
  </div>

    <div>

/* ---------- Rendering ---------- */
const grid = document.getElementById("grid");

// Deterministic HSL color derived from a channel name string.
function chipColor(channel){
  let h=0;
  for(let i=0;i<channel.length;i++) h=(h*31+channel.charCodeAt(i))>>>0;
  return `hsl(${h%360} 60% 45%)`;
}

function channelAvatar(channel, id){
  const initials = channel.split(/\s+/).slice(0,2).map(s=>s[0]).join("").toUpperCase();
  const bg = chipColor(channel);
  const idAttr = id ? ` id="${id}"` : "";
  return `<div class="ch"${idAttr} style="background:${bg}">${initials}</div>`;
}

function videoCard(v){
  return `
  <article class="card" data-id="${v.id}" data-cat="${v.cat}">
    <div class="thumb">
      <img loading="lazy" src="${v.thumb}" alt="${v.title.replace(/"/g,'&quot;')}">
      <span class="duration">${v.duration}</span>
    </div>
    <div class="info">
      ${channelAvatar(v.channel)}
      <div class="meta">
        <h3 class="title">${v.title}</h3>
        <div class="sub">
          <span class="ch-name">${v.channel}</span>
          <span>${v.views} &middot; ${v.date}</span>
        </div>
      </div>
    </div>
  </article>`;
}

function adCard(){
  // A-ADS ad unit 2447509 - injected as a Sponsored card to test ad placement
  return `
  <article class="card ad" data-id="ad-2447509">
    <div class="thumb ad-thumb">
      <div class="ad-badge">Ad</div>
      <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f8f8f8;color:#606060;font-size:12px;padding:10px;text-align:center">
        <iframe data-aa="2447509" src="//acceptable.a-ads.com/2447509/?size=Adaptive" style="border:0;width:100%;height:100%;display:block" loading="lazy" referrerpolicy="no-referrer"></iframe>
      </div>
    </div>
    <div class="info">
      <span class="ad-info-icon" aria-hidden="true">i</span>
      <div class="meta">
        <h3 class="title">Acceptable Ads - Placement test (unit 2447509)</h3>
        <div class="sub">
          <span>A-ADS Self-Serve Network</span>
          <span>Sponsored</span>
        </div>
      </div>
    </div>
  </article>`;
}

function render(category){
  let html = adCard();
  const filtered = category === "all" ? videos : videos.filter(v => v.cat === category);
  filtered.forEach(v => { html += videoCard(v); });
  grid.innerHTML = html;
}
render("all");

/* ---------- Filter chips ---------- */
document.getElementById("chipBar").addEventListener("click",(e)=>{
  const t = e.target.closest(".chip");
  if(!t) return;
  document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
  t.classList.add("active");
  render(t.dataset.cat);
});

/* ---------- Drawer ---------- */
const drawer = document.getElementById("drawer");
document.getElementById("menuBtn").addEventListener("click",()=>{
  drawer.classList.toggle("open");
});

/* ---------- Watch overlay ---------- */
const overlay = document.getElementById("overlay");
const playerVideo = document.getElementById("playerVideo");
const watchTitle = document.getElementById("watchTitle");
const watchViews = document.getElementById("watchViews");
const watchDate = document.getElementById("watchDate");
const watchChName = document.getElementById("watchChName");
const watchChSubs = document.getElementById("watchChSubs");
const watchChAvatar = document.getElementById("watchChAvatar");
const watchDescription = document.getElementById("watchDescription");
const recList = document.getElementById("recList");
const closeWatch = document.getElementById("closeWatch");

function openVideo(v){
  playerVideo.src = v.src;
  playerVideo.poster = v.thumb;
  playerVideo.play().catch(()=>{});
  watchTitle.textContent = v.title;
  watchViews.textContent = v.views;
  watchDate.textContent = v.date;
  watchChName.textContent = v.channel;
  watchChSubs.textContent = v.subs;
  // Re-query the DOM each call so a stale reference never drifts after outerHTML swap.
  const prevAv = document.getElementById("watchChAvatar");
  if(prevAv) prevAv.outerHTML = channelAvatar(v.channel, "watchChAvatar");
  watchDescription.innerHTML = `<div class="stats">${v.views} &middot; ${v.date}</div>${v.desc}`;

  recList.innerHTML = videos.filter(x=>x.id!==v.id).slice(0,6).map(x=>`
    <div class="rec-card" data-id="${x.id}">
      <div class="thumb"><img loading="lazy" src="${x.thumb}" alt=""><span class="duration">${x.duration}</span></div>
      <div class="meta">
        <h4 class="title">${x.title}</h4>
        <div class="sub"><span class="ch-name">${x.channel}</span><span>${x.views} &middot; ${x.date}</span></div>
      </div>
    </div>`).join("");

  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closePlayer(){
  overlay.classList.remove("open");
  playerVideo.pause();
  playerVideo.removeAttribute("src");
  playerVideo.load();
  document.body.style.overflow = "";
}

grid.addEventListener("click",(e)=>{
  const t = e.target.closest(".card");
  if(!t) return;
  const id = t.dataset.id;
  const v = videos.find(x=>x.id===id);
  if(v) openVideo(v);
});

recList.addEventListener("click",(e)=>{
  const t = e.target.closest(".rec-card");
  if(!t) return;
  const v = videos.find(x=>x.id===t.dataset.id);
  if(v) openVideo(v);
});

closeWatch.addEventListener("click",closePlayer);
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape" && overlay.classList.contains("open")) closePlayer(); });

/* ---------- Search: icon button + dropdown panel ---------- */
const searchToggle = document.getElementById("searchToggle");
const searchDropdown = document.getElementById("searchDropdown");
const searchClose = document.getElementById("searchClose");
const searchDropdownInput = searchDropdown.querySelector("input");

function openSearch(){
  searchDropdown.classList.add("open");
  searchToggle.classList.add("active");
  searchToggle.setAttribute("aria-expanded", "true");
  // Focus the input after the open transition starts.
  setTimeout(()=>{ if(searchDropdownInput) searchDropdownInput.focus(); }, 60);
}
function closeSearch(){
  searchDropdown.classList.remove("open");
  searchToggle.classList.remove("active");
  searchToggle.setAttribute("aria-expanded", "false");
  if(searchDropdownInput) searchDropdownInput.blur();
}
function toggleSearch(){
  searchDropdown.classList.contains("open") ? closeSearch() : openSearch();
}

searchToggle.addEventListener("click", toggleSearch);
searchClose.addEventListener("click", closeSearch);

// Click anywhere outside the dropdown closes it.
document.addEventListener("click",(e)=>{
  if(!searchDropdown.classList.contains("open")) return;
  if(searchDropdown.contains(e.target) || searchToggle.contains(e.target)) return;
  closeSearch();
});

// Enter inside the search field filters the grid. Dropdown stays open so the
// user can keep refining without re-opening it.
searchDropdownInput.addEventListener("keydown",(e)=>{
  if(e.key !== "Enter") return;
  const q = e.currentTarget.value.trim().toLowerCase();
  if(!q){ render("all"); document.querySelector('.chip[data-cat="all"]').click(); return; }
  const found = videos.filter(v=> v.title.toLowerCase().includes(q) || v.channel.toLowerCase().includes(q));
  if(found.length === 0){
    grid.innerHTML = `<div style="color:#aaa;padding:60px 40px;text-align:center;font-size:18px">No results for &ldquo;${q.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}&rdquo;<div style="font-size:13px;color:#717171;margin-top:8px">Try different keywords or check the spelling.</div></div>`;
  } else {
    grid.innerHTML = adCard() + found.map(videoCard).join("");
  }
});

// Escape closes the dropdown and sends focus back to the toggle.
document.addEventListener("keydown",(e)=>{
  if(e.key === "Escape" && searchDropdown.classList.contains("open")){
    closeSearch();
    searchToggle.focus();
  }
});
</script>
